- name: Deploy Flask App with Docker
  hosts: vm
  become: true

  tasks:
    # On ne met à jour que si Docker manque (gain de temps énorme)
    - name: Install Docker if missing
      apt:
        name: docker.io
        state: present
      register: docker_install
      # On ne le fait que si nécessaire

    - name: Stop and remove old container
      shell: "docker stop flask-app || true && docker rm flask-app || true"

    - name: Create app directory
      file:
        path: /home/ubuntu/flask_app
        state: directory
        mode: '0755'

    - name: Copy files
      copy:
        src: "../{{ item }}"
        dest: "/home/ubuntu/flask_app/{{ item }}"
      loop:
        - app.py
        - Dockerfile
        - requirements.txt
        - static/
        - templates/

    - name: Build Docker image (On-VM)
      shell: "docker build -t flask-app ."
      args:
        chdir: /home/ubuntu/flask_app/

    - name: Run Flask container
      shell: "docker run -d -p 5000:5000 --name flask-app flask-app"
